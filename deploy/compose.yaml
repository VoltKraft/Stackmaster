# Stackmaster — Compose Spec skeleton (compose.yaml)
#
# Status
#   Scaffolding only. Every service below is commented out. No image
#   tags, no ports exposed, no credentials. The file documents the
#   intended service topology; iteration 2 will turn it into a working
#   deployment.
#
# File name
#   Uses the modern Compose Spec file name (`compose.yaml`), which
#   Docker Compose v2 discovers automatically without `-f`. The legacy
#   `docker-compose.yml` name is deliberately not used.
#
# When to touch this file
#   After ADR-0001 (language) and ADR-0005 (credential vault) land.
#
# See docs/ARCHITECTURE.md §8 for the deployment model.

# `version:` is intentionally omitted; the Compose Spec does not use it.

